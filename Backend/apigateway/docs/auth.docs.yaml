tags:
  - name: Users / Auth
    description: Authentication and User Management

paths:
  /user/register:
    post:
      tags:
        - Users / Auth
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - name
              properties:
                email:
                  type: string
                password:
                  type: string
                name:
                  type: string
      responses:
        '201':
          description: User registered successfully
        '400':
          description: Bad request

  /user/login:
    post:
      tags:
        - Users / Auth
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: User logged in successfully
        '401':
          description: Unauthorized

  /user/me:
    get:
      tags:
        - Users / Auth
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile data
        '401':
          description: Unauthorized

  /user/logout:
    get:
      tags:
        - Users / Auth
      summary: Logout user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User logged out
    post:
      tags:
        - Users / Auth
      summary: Logout user via POST
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User logged out
